name=InstantIoT
version=1.2.0
author=JeanLoick DT <jeanloickdt@gmail.com>
maintainer=JeanLoick DT <jeanloickdt@gmail.com>
sentence=Arduino client for the InstantIoT mobile app — bridges ESP32, ESP8266 and Arduino Uno R4 WiFi with a simple declarative DSL.
paragraph=Connects your Arduino board to the InstantIoT mobile app over Wi-Fi. Two active transports: Wi-Fi SoftAP (the board hosts its own Wi-Fi, no router) and Wi-Fi client to a self-hosted InstantIoT Server (multi-device, with history). Seventeen widgets out of the box: simple/advanced/emergency buttons, horizontal/vertical sliders, switch, joystick, direction pad, segmented switch, LED, gauge, metric, bar chart, advanced chart, horizontal/vertical level meters and text. Declarative DSL: file-scope blocks like ISimpleButton("btn1") { WHEN_PRESSED { ... } } — no boilerplate. Compact binary protocol about 5x smaller than JSON. Bluetooth Classic, BLE and SoftwareSerial transports ship in source as preview — they are not currently exposed by the mobile app (see README).
category=Communication
license=MIT
url=https://github.com/jeanloickdt/InstantIoT
architectures=esp32,esp8266,renesas_uno
includes=InstantIoTWiFiAP.hpp,InstantIoTWiFiServer.hpp
